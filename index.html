<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physio Quiz | Physiotherapy Learning Quiz</title>
    <meta
      name="description"
      content="Practice physiotherapy MCQs, review explanations, and track quiz history locally in your browser."
    />
    <link rel="canonical" href="https://your-github-username.github.io/physio-quiz/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Physio Quiz | Physiotherapy Learning Quiz" />
    <meta
      property="og:description"
      content="A static physiotherapy education quiz with local progress tracking and no account required."
    />
    <meta property="og:url" content="https://your-github-username.github.io/physio-quiz/" />
    <meta property="og:site_name" content="Physio Quiz" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Physio Quiz | Physiotherapy Learning Quiz" />
    <meta
      name="twitter:description"
      content="Practice physiotherapy quiz questions and track progress locally in your browser."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script>
      (() => {
        const STORAGE_KEY = 'physio_quiz_theme_mode';
        const VALID_MODES = new Set(['light', 'dark', 'system']);

        try {
          const storedMode = localStorage.getItem(STORAGE_KEY);
          const mode = VALID_MODES.has(storedMode) ? storedMode : 'system';
          const theme = mode === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : mode === 'system'
              ? 'light'
              : mode;

          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.setAttribute('data-theme-mode', mode);
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.setAttribute('data-theme-mode', 'system');
          document.documentElement.style.colorScheme = 'light';
        }
      })();
    </script>
    <link rel="stylesheet" href="./src/styles/global.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
