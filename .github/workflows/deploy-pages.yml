name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate runtime config secrets
        run: |
          test -n "${{ secrets.PHYSIO_QUIZ_SUPABASE_URL }}" || (echo "Missing secret: PHYSIO_QUIZ_SUPABASE_URL" && exit 1)
          test -n "${{ secrets.PHYSIO_QUIZ_SUPABASE_ANON_KEY }}" || (echo "Missing secret: PHYSIO_QUIZ_SUPABASE_ANON_KEY" && exit 1)

      - name: Build
        env:
          PHYSIO_QUIZ_SUPABASE_URL: ${{ secrets.PHYSIO_QUIZ_SUPABASE_URL }}
          PHYSIO_QUIZ_SUPABASE_ANON_KEY: ${{ secrets.PHYSIO_QUIZ_SUPABASE_ANON_KEY }}
          PHYSIO_QUIZ_SUPABASE_FUNCTIONS_URL: ${{ secrets.PHYSIO_QUIZ_SUPABASE_FUNCTIONS_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
